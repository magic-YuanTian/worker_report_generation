# PDF Vectorization Pipeline Configuration
# Environment variables: ${VAR_NAME:default_value}

data:
  raw: data/raw                  # input folder — place PDFs here
  processed: data/processed      # output root — one subfolder per PDF is created here

extraction:
  method: pymupdf                # pymupdf: fast, good for digital PDFs
                                 # pdfplumber: better for tables
  min_figure_px: 100              # images smaller than this in either dimension are skipped
                                 # catches decorative pixels, icons, and PDF artifacts

chunking:
  strategy: recursive            # recursive: splits on paragraphs → lines → sentences → words
                                 # fixed: splits purely by character count, ignores structure
  chunk_size: 512               # maximum characters per chunk
  chunk_overlap: 128             # characters carried over from previous chunk (keeps context at boundaries)
                                 # rule of thumb: 10–20% of chunk_size
  separators:                    # ordered list of split points for the recursive strategy
    - "\n\n"                     # paragraph break — tried first
    - "\n"                       # line break
    - ". "                       # sentence end
    - " "                        # word boundary — last resort before hard character split

vectorization:
  model_type: sentence_transformers   # sentence_transformers: runs locally, no API key needed
                                      # openai: cloud, requires OPENAI_API_KEY in .env
  model_name: ${EMBEDDING_MODEL:all-MiniLM-L6-v2}  # overridable via .env; default is fast 384-dim model
  openai_api_key: ${OPENAI_API_KEY:}                # read from .env — leave blank for local models
  batch_size: 32                 # chunks processed per embedding call; increase if GPU/RAM allows
  output_format: numpy           # numpy: saves as .npz (compact, fast to load with np.load)
                                 # json: saves as .json (human-readable, larger)
  include_metadata: true         # if true, source page number is stored alongside each embedding
